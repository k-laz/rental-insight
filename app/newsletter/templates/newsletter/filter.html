{% block content %}
<div class="container my-5">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Update Your Preferences</h2>
      {% if form.non_field_errors %}
      <div class="alert alert-danger" role="alert">
        {% for error in form.non_field_errors %}
        {{ error }}
        {% endfor %}
      </div>
      {% endif %}
      
      <form action="{% url 'newsletter:profile' %}" method="post" class="form-filter">
        {% csrf_token %}
        <div class="form-row">
          {{ form.as_p }}
        </div>
        <div class="mt-3 d-flex justify-content-between align-items-center">
          <button type="submit" class="btn btn-primary">Update Preferences</button>
          <a href="{% url 'newsletter:profile' %}" class="btn btn-outline-secondary">Back to Profile</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block javascript %}
<!-- Place your JavaScript here if needed -->
{% endblock %}
