<form action="{% url 'newsletter:profile' %}" method="post" class="form-filter">
    {% csrf_token %}

    <!-- Display form errors -->
    {% if form.non_field_errors %}
        <div class="alert alert-danger" role="alert">
            {% for error in form.non_field_errors %}
                {{ error }}
            {% endfor %}
        </div>
    {% endif %}

    <!-- Max Price -->
    <div class="form-group row">
        <label for="{{ form.max_price.id_for_label }}" class="col-sm-4 col-form-label">{{ form.max_price.label }}</label>
        <div class="col-sm-8">
            {{ form.max_price }}
        </div>
    </div>

    <!-- Min Beds -->
    <div class="form-group row">
        <label for="{{ form.min_beds.id_for_label }}" class="col-sm-4 col-form-label">{{ form.min_beds.label }}</label>
        <div class="col-sm-8">
            {{ form.min_beds }}
        </div>
    </div>

    <!-- Min Bathrooms -->
    <div class="form-group row">
        <label for="{{ form.min_bathrooms.id_for_label }}" class="col-sm-4 col-form-label">{{ form.min_bathrooms.label }}</label>
        <div class="col-sm-8">
            {{ form.min_bathrooms }}
        </div>
    </div>

    <!-- Move-in Date -->
    <div class="form-group row">
        <label for="{{ form.move_in_date.id_for_label }}" class="col-sm-4 col-form-label">{{ form.move_in_date.label }}</label>
        <div class="col-sm-8">
            {{ form.move_in_date }}
        </div>
    </div>

    <!-- Length of Stay -->
    <div class="form-group row">
        <label for="{{ form.length_of_stay.id_for_label }}" class="col-sm-4 col-form-label">{{ form.length_of_stay.label }}</label>
        <div class="col-sm-8">
            {{ form.length_of_stay }}
        </div>
    </div>

    <!-- Gender -->
    <div class="form-group row">
        <label for="{{ form.gender.id_for_label }}" class="col-sm-4 col-form-label">{{ form.gender.label }}</label>
        <div class="col-sm-8">
            {{ form.gender }}
        </div>
    </div>

    <!-- Personal Bathroom -->
    <div class="form-group row">
        <label for="{{ form.personal_bathroom.id_for_label }}" class="col-sm-4 col-form-label">{{ form.personal_bathroom.label }}</label>
        <div class="col-sm-8">
            {{ form.personal_bathroom }}
        </div>
    </div>

    <button type="submit" class="btn btn-success">Update</button>
</form>
