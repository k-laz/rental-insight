{% extends "base.html" %} 
{% block content %}
  <p>Welcome <b>{{user.email}}</b></p> 

  <form action="{% url 'members:logout_user' %}" method="post">
    {% csrf_token %}
    <button type="submit">Log Out</button>
  </form>
  <br />
  <br />
  <h3>Filter</h3>
  {% include "./filter_form.html" %}
  <br />
  <br />
  <h3>Matched Listings</h3>
  <ul>
    {% for listing in listings %}
      <li>{{ listing.title }}</li>
    {% empty %}
      <p>No listings found.</p>
    {% endfor %}
  </ul>
{% endblock%}
