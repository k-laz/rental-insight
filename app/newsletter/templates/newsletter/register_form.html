{% comment %} {% if form.errors %}
<p>There was an error with your form... </p>
{% endif %} {% endcomment %}

<form action="{% url 'newsletter:register_user' %}" method="post" class="form-signup">
    {% csrf_token %}
    {% comment %} {{ form.as_p }} {% endcomment %}
    <div class="form-group">
        <label for="emailInput" class="sr-only">Email address</label>
        <input type="email" class="form-control" id="emailInput" placeholder="Enter email" name="email" required />
    </div>

    <div class="form-group">
        <label for="passwordInput" class="sr-only">Password</label>
        <input type="password" class="form-control" id="passwordInput" placeholder="Enter password" name="password" required />
    </div>

    <!-- Max Price -->
    <div class="form-group row">
        <label for="maxPriceInput" class="col-sm-4 col-form-label">Max Price</label>
        <div class="col-sm-8">
            <input type="number" class="form-control" id="maxPriceInput" name="max_price" min="0" required />
        </div>
    </div>

    {% comment %} <!-- Own Bathroom -->
    <div class="form-group row">
        <label for="personalBathroomCheckbox" class="col-sm-4 col-form-label">Personal Bathroom</label>
        <div class="col-sm-2 d-flex align-items-center">
            <input type="checkbox" class="form-check-input" id="personalBathroomCheckbox" name="personal_bathroom" />
        </div>
    </div> {% endcomment %}

    <!-- Min Beds -->
    <div class="form-group row">
        <label for="minBedsInput" class="col-sm-4 col-form-label">Min Beds</label>
        <div class="col-sm-8">
            <input type="number" class="form-control" id="minBedsInput" name="min_beds" min="0" required />
        </div>
    </div>

    <!-- Min Bathrooms -->
    <div class="form-group row">
        <label for="minBathroomsInput" class="col-sm-4 col-form-label">Min Bathrooms</label>
        <div class="col-sm-8">
            <input type="number" class="form-control" id="minBathroomsInput" name="min_bathrooms" min="0" required />
        </div>
    </div>

    <!-- Move-in Date -->
    <div class="form-group row">
        <label for="moveInDateInput" class="col-sm-4 col-form-label">Move-in Date</label>
        <div class="col-sm-8">
            <input type="date" class="form-control" id="moveInDateInput" name="move_in_date" required />
        </div>
    </div>

    <!-- Length of Stay -->
    <div class="form-group row">
        <label for="lengthOfStaySelect" class="col-sm-4 col-form-label">Length of Stay</label>
        <div class="col-sm-8">
            <select class="form-control" id="lengthOfStaySelect" name="length_of_stay">
                <option value="4">4 months</option>
                <option value="8">8 months</option>
                <option value="12">12 months</option>
            </select>
        </div>
    </div>

    <!-- Gender -->
    <div class="form-group row">
        <label for="genderSelect" class="col-sm-4 col-form-label">Gender</label>
        <div class="col-sm-8">
            <select class="form-control" id="genderSelect" name="gender">
                <option value="0">Male</option>
                <option value="1">Female</option>
            </select>
        </div>
    </div>

    <!-- Private Bathroom -->
    <div class="form-group row">
        <label class="col-sm-4 col-form-label" for="personalBathroomCheckbox">Private Bathroom</label>
        <div class="col-sm-8 d-flex align-items-center">
            <input type="checkbox" class="form-check-input" id="personalBathroomCheckbox" name="personal_bathroom">
            <label class="form-check-label ml-3" for="personalBathroomCheckbox">Yes</label>
        </div>
    </div>


    <button type="submit" class="btn btn-success">Subscribe</button>
</form>
