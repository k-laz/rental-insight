{% extends "base.html" %} 
{% block content %}

{% if form.errors %}
<div class="alert alert-warning" role="alert">
  There was an error with your sign up... Please try again
</div>
{% endif %}

<div class="text-center my-5">
  <h2>Subscribe to our Newsletter!</h2>
  <p>
    It’s free! If it's not providing value you are free to unsubscribe at any
    time.
  </p>
  <div class="container my-5">
      
    <div class="border rounded p-4 mx-auto" style="max-width: 600px;">
      
      <form action="{% url 'members:register_user' %}" method="POST">
        {% csrf_token %} {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Subscribe</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
