{% extends "base.html" %} 
{% block content %}

{% if form.errors %}
<div class="alert alert-warning" role="alert">
  There was an error with your sign up... Please try again
</div>
{% endif %}

<div class="text-center my-5">
  <h2>Subscribe to our Newsletter!</h2>
  <p>
    It’s free! If it's not providing value you are free to unsubscribe at any
    time.
  </p>
  <a class="btn btn-primary" href="{% url 'members:register_user' %}" role="button">Subscribe</a>
</div>
{% endblock %}
